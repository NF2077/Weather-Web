<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Web - Prakiraan Cuaca Real-Time</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome untuk ikon pencarian dan detail -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="card">
        <!-- Bagian Input Pencarian -->
        <div class="search-box">
            <input type="text" id="city-input" placeholder="Masukkan nama kota..." autocomplete="off">
            <button id="search-btn">
                <i class="fa-solid fa-magnifying-glass"></i> Cari
            </button>
        </div>

        <!-- Bagian Tampilan Informasi Cuaca -->
        <div class="weather-info">
            <h2 id="city-name">Nama Kota</h2>
            
            <!-- Ikon Cuaca Otomatis dari API -->
            <img src="https://openweathermap.org/img/wn/02d@2x.png" id="weather-icon" alt="Ikon Cuaca">
            
            <h1 id="temperature">--°C</h1>
            <p id="description" class="weather-desc">Masukkan kota untuk melihat cuaca</p>
            
            <hr>

            <!-- Detail Tambahan (Kelembapan & Angin) -->
            <div class="details">
                <div class="col">
                    <i class="fa-solid fa-droplet"></i>
                    <div>
                        <p id="humidity">--%</p>
                        <p>Kelembapan</p>
                    </div>
                </div>
                <div class="col">
                    <i class="fa-solid fa-wind"></i>
                    <div>
                        <p id="wind-speed">-- m/s</p>
                        <p>Kecepatan Angin</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
